name: CI

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".cursor/**"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".cursor/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

  build-db:
    name: Build OEIS database
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache OEIS dumps and database
        uses: actions/cache@v4
        with:
          path: |
            assets/oeis.db
            scripts/.oeis-data
          key: oeis-db-${{ hashFiles('scripts/build-db.mjs') }}

      - name: Install dependencies
        run: npm ci

      - name: Build oeis.db
        run: npm run build:db

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: oeis-db
          path: assets/oeis.db
          retention-days: 1

  e2e:
    name: Playwright E2E (web)
    runs-on: ubuntu-latest
    needs: build-db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Download OEIS database
        uses: actions/download-artifact@v4
        with:
          name: oeis-db
          path: assets

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true

  export-web:
    name: Expo web export
    runs-on: ubuntu-latest
    needs: build-db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Download OEIS database
        uses: actions/download-artifact@v4
        with:
          name: oeis-db
          path: assets

      - name: Install dependencies
        run: npm ci

      - name: Export web bundle
        run: npm run export:web
